name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          # Publish in dependency order: core -> fetch -> search.
          # Skip crates whose current version is already on crates.io so a
          # partial run can be safely retried. pipefail ensures a failed
          # `cargo publish` is not masked by the `tee` exit code.
          publish() {
            local status
            cargo publish -p "$1" 2>&1 | tee /tmp/publish.log
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              return 0
            fi
            if grep -q "already exists on crates.io" /tmp/publish.log; then
              echo "$1 already published — skipping"
              return 0
            fi
            return "$status"
          }
          publish webtools-core
          publish webtools-fetch
          publish webtools-search

  # Create the GitHub release once, with auto-generated notes, so the matrix
  # build jobs can attach assets to it.
  create-release:
    name: Create GitHub release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      # Builds the binary (cross-compiling where needed), archives it
      # (.tar.gz on unix, .zip on windows), generates a per-asset .sha256,
      # and uploads all three to the release for ${{ github.ref }}.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: webtools
          target: ${{ matrix.target }}
          archive: webtools-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Aggregate the per-asset checksums into a single SHA256SUMS file so a
  # downloader (e.g. an ensureTool fetcher) can verify any asset in one place.
  checksums:
    name: Aggregate SHA256SUMS
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build SHA256SUMS from per-asset checksums
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir sums && cd sums
          # Each archive uploaded a "<archive>.sha256" alongside it.
          gh release download "$tag" --pattern '*.sha256' --dir .
          # Normalize to "<hash>  <filename>" lines (drop any path prefix) and
          # combine, sorted by filename for a stable, diffable manifest.
          : > SHA256SUMS
          for f in *.sha256; do
            # A .sha256 file contains: "<hash>  <name>"; keep as-is, basename only.
            awk '{ n = $2; sub(/.*\//, "", n); print $1 "  " n }' "$f" >> SHA256SUMS
          done
          sort -k2 -o SHA256SUMS SHA256SUMS
          echo "==== SHA256SUMS ===="; cat SHA256SUMS
          gh release upload "$tag" SHA256SUMS --clobber
