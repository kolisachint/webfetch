name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # Publish in dependency order: core -> webfetch -> websearch.
          # Skip crates whose current version is already on crates.io so a
          # partial run can be safely retried.
          publish() {
            if cargo publish -p "$1" 2>&1 | tee /tmp/publish.log; then
              return 0
            fi
            if grep -q "already exists on crates.io" /tmp/publish.log; then
              echo "$1 already published — skipping"
              return 0
            fi
            return 1
          }
          publish webfetch-core
          publish webfetch
          publish websearch

  build:
    name: Build ${{ matrix.target }}
    needs: [publish]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --bin webtools --target ${{ matrix.target }}
      - name: Package
        run: |
          bin=target/${{ matrix.target }}/release/webtools
          tar -czf webtools-${{ matrix.target }}.tar.gz -C "$(dirname "$bin")" webtools
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: webtools-${{ matrix.target }}.tar.gz
          generate_release_notes: true
